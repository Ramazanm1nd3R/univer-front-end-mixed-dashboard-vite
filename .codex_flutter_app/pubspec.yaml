name: taskflow_ai
description: TaskFlow AI mobile client built with Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  go_router: ^16.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  dartz: ^0.10.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  rxdart: ^0.28.0
  collection: ^1.19.1
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  fl_chart: ^1.0.0
  flutter_animate: ^4.5.2
  dart_openai: ^5.1.0
  crypto: ^3.0.6
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
